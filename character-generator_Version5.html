<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spark of Rebellion — Character Generator</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
</head>
<body>
  <header>
    <h1>⚡ Spark of Rebellion</h1>
    <p>Create your Gayerverse agent. Choose your spark, banner, and pronouns.</p>
    <nav>
      <a href="index.html">Portal</a>
    </nav>
  </header>
  <main>
    <form>
      <label>Agent Name: <input type="text" name="agentName" placeholder="Your alias"></label><br>
      <label>Pronouns: <input type="text" name="pronouns" placeholder="e.g. they/them"></label><br>
      <label>Spark Type:
        <select name="sparkType">
          <option>Code Witch</option>
          <option>Resonator</option>
          <option>Quantum Conduit</option>
          <option>Beacon</option>
        </select>
      </label><br>
      <button type="submit" disabled>Generate (Coming Soon)</button>
    </form>
    <p>✨ Interactive character creation coming in Phase 2!</p>
  </main>
  <footer>
    <p>&copy; 2025 The Gayerverse Initiative.</p>
  </footer>
</body>
</html>
